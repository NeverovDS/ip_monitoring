name: CI / Deploy

on:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: ip_monitoring_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
    env:
      RAILS_ENV: test
      DB_HOST: 127.0.0.1
      DB_PORT: 5433
      DB_USER: postgres
      DB_PASSWORD: password
      REDIS_URL: redis://127.0.0.1:6379/0
      RAILS_MASTER_KEY: ${{ secrets.RAILS_MASTER_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4.2"
          bundler-cache: true
      - name: Prepare test database
        run: bin/rails db:test:prepare
      - name: Run tests
        run: bin/rails test

  deploy:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-24.04-arm # native arm64 build for the Graviton EC2
    permissions:
      id-token: write # for GitHub OIDC -> AWS
      contents: read
    env:
      IP_MONITORING_DATABASE_PASSWORD: ${{ secrets.IP_MONITORING_DATABASE_PASSWORD }}
      ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
      ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
      RAILS_MASTER_KEY: ${{ secrets.RAILS_MASTER_KEY }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Kamal builds from a git clone by commit SHA
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4.2"
          bundler-cache: true
      - uses: docker/setup-buildx-action@v3
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: eu-north-1
      - name: Set up SSH key and known_hosts
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/ipmon-key.pem
          chmod 600 ~/.ssh/ipmon-key.pem
          ssh-keyscan -H 51.20.162.241 >> ~/.ssh/known_hosts
      - name: Deploy with Kamal
        # .kamal/secrets pulls KAMAL_REGISTRY_PASSWORD from `aws ecr get-login-password`
        # (AWS creds come from OIDC above) and the rest from the env vars set here.
        run: bin/kamal deploy
