development:
  # Redis (not the in-process `async` adapter): the Sidekiq worker runs in a
  # separate process, so it and Puma must share a broker to deliver broadcasts.
  adapter: redis
  url: <%= ENV.fetch("REDIS_URL") { "redis://localhost:6379/1" } %>
  channel_prefix: ip_monitoring_development

test:
  adapter: test

production:
  adapter: redis
  url: <%= ENV.fetch("REDIS_URL") { "redis://localhost:6379/1" } %>
  channel_prefix: ip_monitoring_production
